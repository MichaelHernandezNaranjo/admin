<p-toolbar styleClass="page-toolbar">
  <ng-template pTemplate="start">
    <div class="toolbar-title">
      <i class="pi pi-shield"></i>
      <h2>Perfiles</h2>
      <p-tag [value]="totalCount() + ' perfiles'" severity="secondary"></p-tag>
    </div>
  </ng-template>
  <ng-template pTemplate="end">
    @if (authService.hasPermission('profiles.create')) {
      <p-button label="Nuevo Perfil" icon="pi pi-plus" (onClick)="goToNewProfile()"></p-button>
    }
  </ng-template>
</p-toolbar>

<div class="card">
  <p-table 
    [value]="profiles()" 
    [paginator]="true" 
    [rows]="pageSize" 
    [totalRecords]="totalCount()"
    [loading]="loading()"
    [lazy]="true" 
    (onPage)="onPage($event)"
    [first]="first"
    [tableStyle]="{'min-width': '60rem'}"
    styleClass="p-datatable-striped">
    
    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="name">Nombre <p-sortIcon field="name"></p-sortIcon></th>
        <th>Descripción</th>
        <th>Permisos</th>
        <th>Estado</th>
        <th style="width: 8rem">Acciones</th>
      </tr>
    </ng-template>
    
    <ng-template pTemplate="body" let-p>
      <tr>
        <td>{{ p.name }}</td>
        <td>{{ p.description }}</td>
        <td>
          <p-tag [value]="(p.permissions?.length || 0).toString()" severity="info"></p-tag>
        </td>
        <td>
          <p-tag [value]="p.isActive ? 'Activo' : 'Inactivo'" [severity]="getActiveSeverity(p.isActive)"></p-tag>
        </td>
        <td>
          @if (authService.hasPermission('profiles.update')) {
            <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" severity="secondary" (onClick)="goToEditProfile(p)"></p-button>
          }
          @if (authService.hasPermission('profiles.delete')) {
            <p-button icon="pi pi-trash" [rounded]="true" [text]="true" severity="danger" (onClick)="deleteProfile(p)"></p-button>
          }
        </td>
      </tr>
    </ng-template>
    
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="5" class="text-center">
          <div class="empty-state">
            <i class="pi pi-shield" style="font-size: 3rem; color: #ccc;"></i>
            <p>No hay perfiles registrados</p>
          </div>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>

<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>
