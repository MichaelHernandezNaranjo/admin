<div class="layout-wrapper" [class.sidebar-open]="sidebarVisible()">
  <!-- Mobile Overlay -->
  <div class="sidebar-overlay" (click)="closeSidebar()"></div>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-inner">
      <!-- Logo -->
      <div class="sidebar-header">
        <a routerLink="/admin/dashboard" class="sidebar-logo-link">
          <img src="/logo.png" alt="d4nthi" class="sidebar-logo" />
        </a>
      </div>

      <!-- Menu -->
      <nav class="menu-list">
        @for (section of menuSections(); track section.label) {
          <div class="menu-section" [class.expanded]="isSectionExpanded(section.label)">
            <button class="menu-section-btn" (click)="toggleSection(section.label)">
              <i [class]="section.icon" class="menu-section-icon"></i>
              <span class="menu-section-label">{{ section.label }}</span>
              <i class="pi pi-chevron-down menu-section-chevron"></i>
            </button>
            <div class="menu-section-items">
              @for (item of section.items; track item.routerLink) {
                <a
                  class="menu-link"
                  [routerLink]="item.routerLink"
                  routerLinkActive="active"
                  (click)="onMenuItemClick()">
                  <i [class]="item.icon" class="menu-link-icon"></i>
                  <span class="menu-link-label">{{ item.label }}</span>
                </a>
              }
            </div>
          </div>
        }
      </nav>

      <!-- User -->
      <div class="sidebar-footer">
        <button class="user-btn" (click)="logout()">
          <p-avatar [label]="getUserAvatar()" shape="circle" size="normal"></p-avatar>
          <span class="user-info">
            <span class="user-name">{{ getUserName() }}</span>
            <span class="user-role">{{ getUserRole() }}</span>
          </span>
        </button>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main-wrapper">
    <!-- Topbar -->
    <header class="topbar">
      <button class="menu-toggle-btn" (click)="toggleSidebar()">
        <i class="pi" [class.pi-bars]="sidebarVisible()" [class.pi-angle-double-right]="!sidebarVisible()"></i>
      </button>
      <app-breadcrumb [items]="breadcrumbItems()"></app-breadcrumb>
      <div class="topbar-actions">
        <button pButton class="p-button-text logout-btn" (click)="logout()">
          <i class="pi pi-sign-out"></i>
        </button>
      </div>
    </header>

    <!-- Content -->
    <main class="page-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
